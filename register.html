<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | ExamPro DSU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6c63ff;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f0f23;
            --bg2: #1a1a3e;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 16px;
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0f0f23 0%, #1a0533 40%, #0f1a3e 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 99, 255, .2) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-50px, 50px)
            }
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding-top: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(108, 99, 255, .4);
            margin-bottom: 12px;
        }

        .logo-area h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 13px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card p.sub {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-wrap input,
        .input-wrap select {
            width: 100%;
            padding: 11px 12px 11px 36px;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
            outline: none;
        }

        .input-wrap select option {
            background: #1a1a3e;
            color: var(--text);
        }

        .input-wrap input:focus,
        .input-wrap select:focus {
            border-color: var(--primary);
            background: rgba(108, 99, 255, .1);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, .2);
        }

        .input-wrap input::placeholder {
            color: var(--text-muted);
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            transition: all .3s;
            background: rgba(255, 255, 255, .1);
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 16px;
        }

        .terms input[type=checkbox] {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .terms label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, .5);
        }

        .btn-primary:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .switch-link {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 16px;
        }

        .switch-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .progress-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .prog-step {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, .1);
            transition: all .4s;
        }

        .prog-step.active {
            background: var(--primary);
        }

        .prog-step.done {
            background: var(--success);
        }

        .step-section {
            display: none;
        }

        .step-section.active {
            display: block;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-outline {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, .05);
        }

        .btn-next {
            flex: 2;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: toastIn .3s ease;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        .toast.success {
            background: rgba(16, 185, 129, .9);
            color: #fff;
        }

        .toast.error {
            background: rgba(239, 68, 68, .9);
            color: #fff;
        }

        .toast.info {
            background: rgba(108, 99, 255, .9);
            color: #fff;
        }

        @keyframes toastIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: auto;
            }

            .card {
                padding: 24px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="register-container">
        <div class="logo-area">
            <div class="logo-icon" style="background: transparent;">
                <img src="dsu_logo.png" alt="DSU Logo" style="height: 100%; width: auto;">
            </div>
            <h1>ExamPro DSU</h1>
            <p>Create your student account</p>
        </div>

        <div class="card">
            <div class="progress-bar">
                <div class="prog-step active" id="prog-1"></div>
                <div class="prog-step" id="prog-2"></div>
                <div class="prog-step" id="prog-3"></div>
            </div>

            <!-- Step 1: Personal Info -->
            <div class="step-section active" id="step1">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <div>
                        <h3>Personal Information</h3>
                        <p style="color:var(--text-muted);font-size:12px">Your basic details</p>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Full Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user icon"></i>
                            <input type="text" id="name" placeholder="Enter your full name" required />
                        </div>
                    </div>
                    <div class="form-group full">
                        <label>Register Number</label>
                        <div class="input-wrap">
                            <i class="fas fa-id-card icon"></i>
                            <input type="text" id="registerNumber" placeholder="e.g. 1DS22CS001" required />
                        </div>
                    </div>
                    <div class="form-group full">
                        <label>Email Address</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope icon"></i>
                            <input type="email" id="email" placeholder="student@dsu.edu" required />
                        </div>
                    </div>
                </div>
                <div class="nav-btns">
                    <button class="btn-outline btn-next" onclick="nextStep(1)">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Step 2: Academic Info -->
            <div class="step-section" id="step2">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <div>
                        <h3>Academic Details</h3>
                        <p style="color:var(--text-muted);font-size:12px">Your college information</p>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>College Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-university icon"></i>
                            <input type="text" id="college" placeholder="Dayananda Sagar University" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Branch</label>
                        <div class="input-wrap">
                            <i class="fas fa-code-branch icon"></i>
                            <select id="branch">
                                <option value="">Select Campus</option>
                                <option>Main Campus (Harohalli)</option>
                                <option>City Innovation (Kudlu Gate)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <div class="input-wrap">
                            <i class="fas fa-building icon"></i>
                            <input type="text" id="department" placeholder="e.g. Engineering" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Section</label>
                        <div class="input-wrap">
                            <i class="fas fa-users icon"></i>
                            <select id="section">
                                <option value="">Select Section</option>
                                <option>A</option>
                                <option>B</option>
                                <option>C</option>
                                <option>D</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <div class="input-wrap">
                            <i class="fas fa-calendar icon"></i>
                            <select id="year">
                                <option value="">Select Year</option>
                                <option>1st Year</option>
                                <option>2nd Year</option>
                                <option>3rd Year</option>
                                <option>4th Year</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="nav-btns">
                    <button class="btn-outline" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
                    <button class="btn-outline btn-next" onclick="nextStep(2)">Next <i
                            class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Step 3: Password -->
            <div class="step-section" id="step3">
                <div class="step-header">
                    <div class="step-number">3</div>
                    <div>
                        <h3>Set Password</h3>
                        <p style="color:var(--text-muted);font-size:12px">Create a secure password</p>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" id="password" placeholder="Min 8 characters"
                                oninput="checkStrength(this.value)" required />
                        </div>
                        <div class="password-strength" id="strengthBar"></div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    <div class="form-group full">
                        <label>Confirm Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
                        </div>
                    </div>
                </div>
                <div class="terms">
                    <input type="checkbox" id="termsCheck" />
                    <label for="termsCheck">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                            Policy</a></label>
                </div>
                <div class="nav-btns">
                    <button class="btn-outline" onclick="prevStep(3)"><i class="fas fa-arrow-left"></i> Back</button>
                    <button class="btn-outline btn-next" onclick="handleRegister()" id="registerBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
            </div>
            <div class="switch-link" style="margin-top:16px;">Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDT0kvwEm0cEdh_MpbTb8A9W3_xwAVxY",
            authDomain: "dsu-exam-system.firebaseapp.com",
            projectId: "dsu-exam-system",
            storageBucket: "dsu-exam-system.firebasestorage.app",
            messagingSenderId: "155083834622",
            appId: "1:155083834622:web:ff0a9780b88bad0b8811af",
            measurementId: "G-1TPT1BR6GD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleRegister = async function () {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const registerNumber = document.getElementById('registerNumber').value.trim();
            const college = document.getElementById('college').value.trim();
            const branch = document.getElementById('branch').value;
            const department = document.getElementById('department').value.trim();
            const section = document.getElementById('section').value;
            const year = document.getElementById('year').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsCheck = document.getElementById('termsCheck').checked;

            if (!termsCheck) { showToast('Please accept the terms.', 'error'); return; }
            if (password !== confirmPassword) { showToast('Passwords do not match.', 'error'); return; }
            if (password.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
            if (!branch || !section || !year) { showToast('Please fill all academic details.', 'error'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating Account...';

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });

                await setDoc(doc(db, 'students', cred.user.uid), {
                    uid: cred.user.uid,
                    name, email, registerNumber,
                    college, branch, department, section, year,
                    photoURL: '',
                    role: 'student',
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp()
                });

                showToast('Account created successfully!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (err) {
                let msg = 'Registration failed.';
                if (err.code === 'auth/email-already-in-use') msg = 'Email already registered. Please login.';
                else if (err.code === 'auth/weak-password') msg = 'Password too weak.';
                showToast(msg, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        };
    </script>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'U') { e.preventDefault(); return false; }
        });

        let currentStep = 1;

        window.nextStep = function (step) {
            if (step === 1) {
                if (!document.getElementById('name').value.trim() ||
                    !document.getElementById('registerNumber').value.trim() ||
                    !document.getElementById('email').value.trim()) {
                    showToast('Please fill all fields.', 'error'); return;
                }
            }
            if (step === 2) {
                if (!document.getElementById('college').value.trim() ||
                    !document.getElementById('branch').value ||
                    !document.getElementById('department').value.trim()) {
                    showToast('Please fill all academic details.', 'error'); return;
                }
            }
            document.getElementById(`step${step}`).classList.remove('active');
            document.getElementById(`step${step + 1}`).classList.add('active');
            document.getElementById(`prog-${step}`).classList.remove('active');
            document.getElementById(`prog-${step}`).classList.add('done');
            document.getElementById(`prog-${step + 1}`).classList.add('active');
            currentStep = step + 1;
        };

        window.prevStep = function (step) {
            document.getElementById(`step${step}`).classList.remove('active');
            document.getElementById(`step${step - 1}`).classList.add('active');
            document.getElementById(`prog-${step}`).classList.remove('active');
            document.getElementById(`prog-${step - 1}`).classList.remove('done');
            document.getElementById(`prog-${step - 1}`).classList.add('active');
            currentStep = step - 1;
        };

        window.checkStrength = function (pw) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (/[A-Z]/.test(pw)) strength++;
            if (/[0-9]/.test(pw)) strength++;
            if (/[^A-Za-z0-9]/.test(pw)) strength++;
            const levels = [
                { label: 'Very Weak', color: '#ef4444', width: '25%' },
                { label: 'Weak', color: '#f59e0b', width: '50%' },
                { label: 'Good', color: '#06b6d4', width: '75%' },
                { label: 'Strong', color: '#10b981', width: '100%' }
            ];
            const l = levels[strength - 1] || { label: '', color: 'rgba(255,255,255,.1)', width: '0%' };
            bar.style.background = l.color;
            bar.style.width = l.width;
            text.textContent = l.label;
            text.style.color = l.color;
        };

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        window.showToast = showToast;
    </script>
</body>

</html>
